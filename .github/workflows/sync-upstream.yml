name: Sync Upstream and Merge PRs

on:
  schedule:
    - cron: '30 0 * * *'   # هر روز ساعت 00:30 UTC
  workflow_dispatch:        # قابلیت اجرای دستی

jobs:
  sync-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/xiaoY233/Chat2API.git

      - name: Fetch all upstream branches and PRs
        run: git fetch upstream

      - name: Merge upstream/main into your main branch
        run: |
          git checkout main
          git merge upstream/main --no-edit || true   # --no-edit برای جلوگیری از باز شدن ادیتور
          # توجه: اگه کونفلیکت داشت، خودکار شکست میخوره و true میگه ادامه بده بعد خطا نده
          # ولی اگه کونفلیکت باشه، بعداً PRها رو ادغام نمیکنه. بهتره بدون || true باشه تا خطا بده و متوقف بشه
          # برای سادگی، من بدون || true میذارم:
      - name: Merge upstream/main (strict)
        run: |
          git checkout main
          git merge upstream/main --no-edit

      - name: Get list of open PRs from upstream
        run: |
          gh pr list --state open --repo xiaoY233/Chat2API --limit 100 --json number --jq '.[].number' > pr-list.txt
          cat pr-list.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge each PR one by one
        run: |
          while read pr_number; do
            echo "Trying to merge PR #$pr_number"
            git fetch upstream pull/$pr_number/head:pr-$pr_number
            if git merge --no-ff pr-$pr_number -m "Merge PR #$pr_number from upstream"; then
              echo "✅ PR #$pr_number merged."
            else
              echo "❌ Conflict in PR #$pr_number. Skipping..."
              git merge --abort
            fi
          done < pr-list.txt

      - name: Push changes to your fork
        run: git push origin main
